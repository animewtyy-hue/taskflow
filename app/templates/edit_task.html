{% extends 'base.html' %}
{% block title %}تعديل المهمة - TaskFlow{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 class="fw-bold"> تعديل المهمة</h4>
  <a href="{{ url_for('dashboard.tasks') }}" class="btn btn-outline-secondary">
    <i class="bi bi-arrow-right"></i> رجوع
  </a>
</div>

<div class="card p-4" style="max-width: 600px;">
  <form method="POST">

    <div class="mb-3">
      <label class="form-label fw-bold">عنوان المهمة *</label>
      <input type="text" name="title"
             class="form-control form-control-lg"
             value="{{ task.title }}" required>
    </div>

    <div class="mb-3">
      <label class="form-label fw-bold">الوصف</label>
      <textarea name="description" class="form-control"
                rows="3">{{ task.description }}</textarea>
    </div>

    <div class="row g-3 mb-3">
      <div class="col-md-6">
        <label class="form-label fw-bold">الأولوية</label>
        <select name="priority" class="form-select">
          <option value="low"
            {% if task.priority=='low' %}selected{% endif %}>
             منخفضة
          </option>
          <option value="medium"
            {% if task.priority=='medium' %}selected{% endif %}>
             متوسطة
          </option>
          <option value="high"
            {% if task.priority=='high' %}selected{% endif %}>
             عالية
          </option>
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label fw-bold">الحالة</label>
        <select name="status" class="form-select">
          <option value="todo"
            {% if task.status=='todo' %}selected{% endif %}>
             قيد الانتظار
          </option>
          <option value="in_progress"
            {% if task.status=='in_progress' %}selected{% endif %}>
             قيد التنفيذ
          </option>
          <option value="done"
            {% if task.status=='done' %}selected{% endif %}>
             مكتملة
          </option>
        </select>
      </div>
    </div>

    <div class="mb-4">
      <label class="form-label fw-bold">تاريخ الاستحقاق</label>
      <input type="date" name="due_date" class="form-control"
             value="{{ task.due_date.strftime('%Y-%m-%d') if task.due_date else '' }}">
    </div>

    <button type="submit" class="btn btn-primary w-100 py-2">
      <i class="bi bi-check-lg"></i> حفظ التعديلات
    </button>

  </form>
</div>
{% endblock %}
